<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#c8102e" />
  <meta name="description" content="潮州市研学管理服务平台 — 政府监管、学校申报、家长报名一站式研学服务" />
  <title>潮州市研学管理服务平台</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c8102e'/><path d='M50 18 L60 42 L86 42 L65 58 L73 84 L50 68 L27 84 L35 58 L14 42 L40 42 Z' fill='white'/></svg>" />
</head>
<body>
  <div class="app">
    <main id="app-main" class="page" style="overflow-y:auto;flex:1;padding-bottom:0"></main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>
    // Initial route
    renderHome();

    // Simple hash routing for back button support
    window.addEventListener('hashchange', () => {
      const hash = location.hash.slice(1) || 'home';
      const [path, query] = hash.split('?');
      const params = {};
      if (query) query.split('&').forEach(p => { const [k,v] = p.split('='); params[k] = v; });
      const fn = { home: renderHome, routes: () => renderList('routes'), courses: () => renderList('courses'),
        bases: () => renderList('bases'), news: () => renderList('news'), mine: renderMine,
        flow: renderFlow, govt: renderGovt, detail: () => renderDetail(params) }[path];
      if (fn) fn();
    });

    // Override navigate to support back via hash
    const _nav = window.navigate;
    window.navigate = function(path, query = {}) {
      let hash = path;
      if (Object.keys(query).length) {
        hash += '?' + Object.entries(query).map(([k,v]) => `${k}=${v}`).join('&');
      }
      if (location.hash.slice(1) !== hash) {
        history.pushState(null, '', '#' + hash);
      }
      _nav(path, query);
    };
    // Make back button work with browser history
    window.addEventListener('popstate', () => {
      const hash = location.hash.slice(1) || 'home';
      const [path, query] = hash.split('?');
      const params = {};
      if (query) query.split('&').forEach(p => { const [k,v] = p.split('='); params[k] = v; });
      _nav(path, params);
    });
  </script>
</body>
</html>
